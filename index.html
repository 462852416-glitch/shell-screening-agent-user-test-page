<style>
:root { --bg:#f5f7fb; --card:#fff; --line:#dde6f1; --text:#172033; --muted:#728199; --accent:#2458d6; --good:#12915a; --warn:#c97916; --shadow:0 14px 38px rgba(20,33,54,.08); }
*{box-sizing:border-box} body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
.page{max-width:1320px;margin:0 auto;padding:24px} .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}

.badge{display:inline-flex;padding:8px 12px;border-radius:999px;background:#edf3ff;color:var(--accent);font-weight:750;font-size:12px}
.grid{display:grid;grid-template-columns:380px minmax(0,1fr);gap:18px} .stack{display:grid;gap:18px} .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px}
.label{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:850;margin-bottom:12px}
textarea{width:100%;min-height:170px;resize:vertical;border:1px solid var(--line);border-radius:14px;padding:14px;font:inherit;line-height:1.65;background:#fbfcff;color:var(--text)}
.actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap} button{border:0;border-radius:14px;padding:12px 16px;font:inherit;font-weight:780;cursor:pointer} .primary{background:var(--accent);color:white} .secondary{background:white;border:1px solid var(--line);color:var(--text)}
.status{display:inline-flex;padding:7px 11px;border-radius:999px;background:#eef3ff;color:var(--accent);font-size:12px;font-weight:780} .status.running{background:#fff1db;color:var(--warn)} .status.done{background:#ddf5e8;color:var(--good)}
.timeline{display:grid;gap:10px} .step{display:grid;grid-template-columns:18px minmax(0,1fr);gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fcfdff}
.dot{width:10px;height:10px;border-radius:999px;background:#ccd7e6;margin-top:5px} .step.running .dot{background:var(--warn)} .step.done .dot{background:var(--good)} .step-title{font-weight:780} .step-sub{font-size:12px;color:var(--muted);margin-top:3px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px} .metric{border:1px solid var(--line);border-radius:14px;padding:14px;background:#f9fbff} .metric div:first-child{color:var(--muted);font-size:12px} .metric strong{display:block;margin-top:8px;font-size:28px;letter-spacing:-.03em}
.top3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px} .candidate{border:1px solid var(--line);border-radius:16px;padding:16px;background:#fbfcff} .code{font-size:12px;color:var(--muted);letter-spacing:.12em;font-weight:850} .name{font-size:20px;font-weight:850;margin:8px 0} .score{font-size:26px;color:var(--accent);font-weight:850;margin-bottom:10px}

.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px} .report{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:white} .report-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center} pre{margin:0;padding:16px;max-height:360px;overflow:auto;white-space:pre-wrap;word-break:break-word;background:#fbfcff;font-size:12px;line-height:1.58}
.hidden{display:none} .result-empty{color:var(--muted);font-size:14px;line-height:1.7} @media(max-width:1100px){.grid,.metrics,.top3,.report-grid{grid-template-columns:1fr}}

<div class="page">
  <div class="hero"><div><div class="title">Shell Screening Agent</div><div class="sub">Input → Screening → DD → Ranking → Report</div></div><div class="badge">User testing page</div></div>
  <div class="grid">

<script>
const DATA = {"metrics": {"Companies screened": 3146, "DD candidates": 1063, "Evidence records": 479, "Shortlist": 10}, "top3": [{"code": "00831.HK", "name": "利亚零售", "score": "100.0", "view": "First-line candidate", "supported": "3", "risk": "2", "pending": "1", "next": "manual PDF read: shareholder table, auditor opinion wording, borrowings note, brand/franchise/licence contract continuity, related-party/transaction perimeter"}, {"code": "00573.HK", "name": "稻香控股", "score": "94.36", "view": "Second-line operating platform", "supported": "2", "risk": "3", "pending": "1", "next": "manual PDF read: shareholder table, auditor opinion wording, borrowings note, brand/franchise/licence contract continuity, related-party/transaction perimeter"}, {"code": "00518.HK", "name": "同得仕（集团）", "score": "90.86", "view": "Third-line / reserve candidate", "supported": "2", "risk": "4", "pending": "0", "next": "manual PDF read: shareholder table, auditor opinion wording, borrowings note, brand/franchise/licence contract continuity, related-party/transaction perimeter"}], "report": "# 吨吨健康科技集团港股上市公司重组标的筛选报告\n\n## 1. 免责条款\n\n本报告基于香港联合交易所上市公司公开资料、HKEXnews 年报及公告、项目筛选工作底稿与合理交易假设编制，仅供吨吨健康科技集团内部讨论及后续中介机构沟通参考之用，不构成法律、财务、税务、审计、估值、投资或监管意见，也不构成对任何交易可完成性的保证。\n\n本报告所涉及的控制权路径、资产注入安排、反收购风险、估值区间、交易成本和时间表，均属于第一阶段筛选及第二阶段推进层面的初步判断。凡涉及 Rule 14.06B、Rule 14.06E、控股权转让同意、品牌/许可合同限制、独立股东批准、清洗豁免、跨境结构、审计调整、或有负债及最终估值的事项，均须由法律顾问、财务顾问、审计师、估值师及监管顾问进行专项尽调与复核后，方可作为正式交易依据。\n\n对于无法从当前公开资料确认的字段或事实，本报告已尽量明确标注“未能从公开资料确认”或“需进一步核验”，而非作推断性填充。所有市场数据在正式对外使用前，建议由交易终端或券商数据库进行更新复核。\n\n---\n\n## 2. 执行摘要\n\n本次筛选面向香港联合交易所上市公司，以“资产重组标的筛选”而非单纯“找壳”为核心定位，采用“价值过滤—交易难度与风险过滤—协同过滤”的三层漏斗方法，对港股小市值、低 P/B、具真实业务基础、但处于经营困境、估值受压或平台价值被低估的上市公司进行逐步收敛，并结合文档级尽调、交易结构初判和协同分析形成 shortlist。\n\n经过候选池构建、规则化初筛、年报与公告回溯、控制权路径梳理、关键风险识别以及第二阶段专项问题包化后，本轮最终推荐名单收敛为三家公司：`00831.HK 利亚零售`、`00573.HK 稻香控股`、`00518.HK 同得仕（集团）`。其中，`00831.HK` 当前仍为最值得优先推进的主线平台，`00573.HK` 为具消费协同但系统较重的 fallback platform，`00518.HK` 则上升为当前第三顺位的 angle-specific reserve candidate。\n\n从当前港股低估值与重组环境看，市场上仍存在一批市值较低、P/B 折价明显、主营业务并未完全消失、但增长乏力或资本市场叙事老化的上市公司。就本项目已深入核验的 Top 3 而言，三家公司市值约处于 `HK$83m–304m` 区间，P/B 约处于 `0.22x–0.46x` 区间，反映出当前港股小市值困境平台仍具被重估与被重组的客观土壤。来源：`data/processed/candidate_dd_table.csv`、`data/processed/dd_shortlist_top10.csv`，项目市场数据快照编制时间 `2026-04-24` 至 `2026-05-06`；正式外发前应重新核验市场价格数据。\n\n本轮最终推荐顺序为：第一优先 `00831.HK 利亚零售`，第二优先 `00573.HK 稻香控股`，第三顺位 `00518.HK 同得仕（集团）`。其背后的核心逻辑不是谁“更像壳”，而是谁更容易形成“真实业务延续 + 可管理监管叙事 + 与吨吨存在真实协同 + 可执行交易路径”的组合。`00831.HK` 的主要问题已被缩窄为 franchise / licence / operator constraints 的合同级核验问题；`00573.HK` 的主要问题则已识别为 entity + site + operations 一体化过深的 perimeter-level carve-out 难题；`00518.HK` 则更像一条偏品牌矩阵、设计联名与轻出海延展的 angle-specific reserve line，其上升来自最新 body-level DD refresh 后的排序更新，而不是已经成为与 `00831.HK` 同层级的主线平台。\n\n### 综合评分排名表\n\n| 排名 | 公司 | 代码 | 协同一句话概括 | 协同潜力 30% | 价值重塑 30% | 交易可行性 25% | 风险可控性 15% | 综合得分 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 1 | 利亚零售 | 00831.HK | 以消费零售、烘焙与品牌触点为基础，最容易承接吨吨的健康生活方式平台扩展叙事 | 8.8 | 8.4 | 8.0 | 7.0 | **8.21** |\n| 2 | 稻香控股 | 00573.HK | 线下餐饮、烘焙与供应链场景强，但系统过重，更适合作为有条件 fallback platform | 8.2 | 7.4 | 6.2 | 6.0 | **7.13** |\n| 3 | 同得仕（集团） | 00518.HK | 具品牌/设计/供应链与轻出海延展接口，但更适合作为角度型备选而非平台主线 | 7.1 | 7.2 | 6.0 | 5.9 | **6.68** |\n\n### 每家标的协同逻辑一句话概括\n\n- **`00831.HK 利亚零售`：** 可以把吨吨的健康饮水与生活方式消费品矩阵嵌入现有零售、烘焙、门店和品牌平台中，构建“消费平台升级”而非“全新跨界装资产”的叙事。\n- **`00573.HK 稻香控股`：** 能提供真实的餐饮、烘焙、OEM、企业餐和 packaged-food 场景触点，但过重的中后台和站点依赖使其更适合作为次优但有场景价值的备选平台。\n- **`00518.HK 同得仕（集团）`：** 可提供品牌、设计、服装制造、零售与海外接口，更像偏 lifestyle brand extension 的角度型备选，但仍需严格控制 operating / debt / perimeter 风险。\n\n### 最终推荐结论\n\n本报告建议吨吨健康科技集团将后续资源优先投入 `00831.HK` 的外部法律 / DD 核验与交易路径设计，重点确认 `Mon cher` 与 `Zoff Singapore` 的 rights continuity、change-of-control sensitivity 与 consent burden；同时，将 `00573.HK` 作为结构性 fallback platform 保留，并仅优先测试其 `Tai Cheong` bakery-centric narrower perimeter 假设，而不是重开整个集团的 broad DD。`00518.HK` 则保留为第三顺位 angle-specific reserve candidate，重点补 litigation、borrowings、pledged deposits 与 property-transaction perimeter 的原文核验，暂不将其上调为与 `00831.HK` 同层级的主线平台。\n\n---\n\n## 3. 客户概况与重组诉求\n\n吨吨健康科技集团当前的公开业务画像，主要围绕健康饮水、健康生活方式消费品、智能/时尚水具及相关消费场景展开。基于案例输入文件与公开品牌叙事，吨吨的核心业务可概括为：围绕健康饮水习惯与生活方式升级，进行水具及相关消费产品的研发、设计、品牌运营和销售，产品形态包括吨吨桶、运动水壶、便携饮水器具、潮流生活方式周边及联名产品，并通过线上电商、内容营销、线下零售/体验场景和海外渠道实现增长。来源：`01_case_input/case_input.md`。\n\n从客户核心能力来看，吨吨较突出的资产不只是单一商品线，而是消费品牌能力与场景组织能力的叠加，包括品牌资产、产品设计能力、供应链组织能力、爆品打造能力、内容营销能力、电商运营能力、线下体验场景建设能力、海外销售经验，以及围绕健康饮水所形成的用户心智与会员运营潜力。若进一步做上市平台重塑，吨吨理论上能够向上市公司注入的不仅是商品销售收入，还包括品牌矩阵、渠道资源、用户运营、联名开发、海外增长与后续生活方式延展能力。\n\n本项目的重组战略目标，不是获得一个完全停摆的空白壳体，而是寻找一个能够承接吨吨品牌升级、资本平台搭建、后续融资并购、渠道整合与国际化叙事的港股上市平台。就此而言，客户对标的公司的核心诉求至少包括五项：第一，平台要与消费品牌、线下零售、生活方式或消费触点存在可叙事的业务延续性；第二，控制权路径要可识别，不能完全依赖纯理论结构；第三，交易成本要可控，首期控股权与整备成本不应显著超出项目预算假设；第四，平台质量不能过差，尤其应避免重大诚信、长期停牌与除牌风险；第五，监管上应尽量有空间构建“业务扩展型收购”而非“单纯买壳注入”的叙事。\n\n在客户内部财务数据尚未完全提供的情况下，本报告采用以下统一假设：其一，客户首期目标是低成本切入并分阶段推进，而非一次性完成激进平台清空式重组；其二，拟注入资产暂以吨吨核心品牌、产品线、供应链与线上线下渠道资源为主；其三，为便于比较，本报告在交易结构与对价估算部分对首期拟注入资产采用约 `HK$300m–800m` 的敏感性测试假设，该区间仅用于结构比较，不构成正式估值意见；其四，项目目标周期暂按 `12–18` 个月完成首阶段平台接触、专项尽调与初步方案推进处理。来源：`01_case_input/case_input.md` 与 `02_prompts/shell_screening_prompt.md`。\n\n---\n\n## 4. 港股重组监管与市场环境\n\n### 4.1 反收购规则框架\n\n港股上市公司重组交易能否落地，核心监管变量之一在于是否被联交所认定为反收购或变相借壳。根据本项目 prompt 的要求，必须将 `Rule 14.06B`、亮线测试、原则为本测试、极端交易测试以及 `Rule 14.06E` 的 36 个月冷静期纳入报告主结构。就本项目而言，最需要警惕的并非单一资产注入动作本身，而是“取得控制权后，是否在较短周期内注入规模显著大于原上市公司且与其历史业务缺乏连续性的全新业务”。如果发生这种情形，哪怕平台本身干净，监管也可能将其视为规避新上市要求的安排。\n\n亮线测试关注的重点，在于控制权变化与资产注入在时序和规模上的结合度；原则为本测试则会综合交易规模、业务性质变化、上市公司原有业务是否被边缘化、收购方是否实质借上市地位实现新上市效果等因素进行整体判断；极端交易测试则进一步强调，若原上市公司原有业务规模过小、交易后新资产成为绝对主导，则即便形式上保留原业务，也不一定足以消除监管疑虑。对吨吨项目而言，这意味着目标平台不能只是“壳”，而应保有足以被论证为真实业务延续的经营基础。\n\n`Rule 14.06E` 的 36 个月冷静期同样关键。若未来交易包含控股权变化、重大收购、资产注入或业务大幅调整，则 36 个月内各类动作之间的关联性与整体效果，都可能被联交所合并审视。本项目中，`00831.HK` 的优势之一，恰恰在于它比纯工业或重资产平台更容易维持消费平台的业务延续性；`00573.HK` 的问题在于系统过重，而 `00518.HK` 的问题则在于它更像 operating business + brand/design/supply-chain interface 的非常规入口，因此虽然可讨论，但仍不如 `00831.HK` 易于构建“原业务延续 + 新业务补强”的监管叙事。\n\n### 4.2 资产重组 vs 借壳上市\n\n本项目对外叙事必须坚持“资产重组”“业务整合”“平台重塑”“价值重塑”，而非直接表述为“借壳”。监管意义上的差异，不仅是措辞差异，更在于交易完成后上市公司能否保留并发展原有业务，吨吨注入的资产是否与原平台具有真实业务协同，是否能够形成客户、场景、渠道、品牌、供应链或运营能力上的延续与补强。换言之，如果交易只是买入平台后立即装入一套与原平台几乎没有关系的新资产，反收购风险自然更高；但如果交易可以论证为消费平台升级、生活方式品牌矩阵扩展、用户运营与渠道资源整合，则更有机会被解释为业务扩展型收购。\n\n对本项目而言，`00831.HK` 当前最适合承载这类叙事，因为其本身具有 bakery、retail、brand 和消费场景基因；吨吨的健康饮水与生活方式消费品矩阵可以被解释为对现有消费平台的延伸、升级与再定位，而不是完全替换其业务逻辑。`00573.HK` 则也存在场景协同，但由于其餐饮—生产—物流—供应链一体化程度过高，更像对一个重系统进行再组织，而不是对一个相对模块化的平台做叙事升级。\n\n### 4.3 近期重组与控制权交易趋势\n\n结合本项目对近期港股小市值公司公告、年报和控制权/关联交易披露的复核经验，当前港股市场的重组与控制权交易趋势至少体现出三个方向。第一，监管对于“业务连续性”与“交易实质”的关注仍然高于纯形式设计，因此纯买壳思维较难成立。第二，小市值平台的控制权转让、资产出售、业务收缩和关联交易重整，客观上为交易创造了议价机会，但也意味着需要更细致区分“可修复困境”和“不可修复风险”。第三，对真正有经营基础、但被资本市场低估的平台，如果能讲出清楚的协同与价值重塑故事，反而更容易获得监管与市场的接受度。\n\n从本项目 shortlist 的结构也能看出这一点：`00831.HK` 并非最“空”，但它最容易支持业务扩展型叙事；`00573.HK` 并非最差，但它的问题更像系统整合难度；`00518.HK` 则提供了品牌/设计/供应链与轻出海接口带来的另一条路径，但当前仍更适合作为 angle-specific reserve，而不是一步到位的平台主线。\n\n### 4.4 港股低估值市场环境\n\n本项目在 `2026-04-24` 至 `2026-05-06` 的市场数据快照与候选筛选中，持续观察到港股市场中存在一批低市值、低 P/B、流动性有限但仍具真实业务基础的上市公司。就已进入深度筛选的三家候选平台而言，`00831.HK` 市值约 `HK$299.3m`、P/B 约 `0.46x`，`00573.HK` 市值约 `HK$304.3m`、P/B 约 `0.28x`，`00518.HK` 市值约 `HK$83.4m`、P/B 约 `0.22x`。来源：`data/processed/candidate_dd_table.csv` 与 `data/processed/dd_shortlist_top10.csv`，项目市场数据快照。\n\n这些公司共同体现了当前港股小市值重组机会的典型特征：估值折价明显、原业务仍在、资本市场关注度偏低、但各自带有不同程度的控制权、资产结构、融资结构或系统复杂性问题。对吨吨这类希望低成本切入上市平台、但又需要真实协同与后续融资扩张能力的客户而言，这类环境意味着“便宜的平台仍有，但真正可用的平台并不多”，因此筛选工作必须围绕业务协同、监管叙事与交易执行难度三者同步展开，而不能只看市值或 P/B。\n\n---\n\n## 5. 筛选方法与三层漏斗\n\n本次筛选采用三层漏斗逻辑推进。第一层是价值过滤，目标是在全港股上市公司中识别低估值、低市值、低市场关注度但仍有真实业务基础的平台，重点关注 P/B、市场资本化、流动性、上市状态与行业错配带来的潜在重组价值。第二层是交易难度与风险过滤，核心任务是剔除存在重大不可修复风险的平台，并收敛出控制权路径可识别、资本结构可量化、历史污染可管理、持续披露正常或基本可修复的候选对象。第三层则是协同过滤，这一步不是附属说明，而是最终推荐的核心，即判断吨吨与标的之间是否能够形成“意料之外，情理之中”的业务、场景、客户群、渠道、供应链及资本市场协同。\n\n在第一层价值过滤中，本项目优先关注低 P/B、小市值、经营承压但并未失去真实业务基础的上市公司。与传统“找壳”不同，本项目并不把困境等同于排除项，而是把经营困难、增长停滞、叙事老化、估值折价、资本市场冷淡等视为可能的议价空间来源，但前提是这些困境必须可修复、可量化、可管理。凡是重大财务造假、长期停牌且复牌路径不清、严重监管处罚、不可量化表外负债或严重控制权纠纷的公司，均不进入下一层。\n\n在第二层交易难度与风险过滤中，本项目重点核验控股股东或实际控制人是否可从公开资料确认，控制权路径是否现实，是否存在复杂的可转债、优先股、认股权证、毒性融资或高风险质押安排，最近审计意见是否干净，是否存在长期停牌、除牌、公众持股或重大监管风险。同时，本项目并未机械排斥所有复杂公司，而是区分“可清理的复杂性”和“不可修复的污染”。在这一层之后，`00831.HK`、`00573.HK` 与 `00518.HK` 被保留为 active leads，但排序尚未完全固化。\n\n第三层协同过滤是真正拉开差距的步骤。`00831.HK` 最终上升为第一优先，是因为它在消费品牌、零售、门店、烘焙和场景层面与吨吨的生活方式消费品逻辑具有更自然的延续性，且平台重塑叙事较顺。`00", "delivery": "# HK Shell Screening Agent — Delivery Report\n\n_Generated: 2026-05-06 15:44 local time_\n\n## 1. What Is Now Runnable\n\nThe project now has a reproducible local pipeline for the current DD refresh layer:\n\n```bash\npython3 scripts/run_delivery_pipeline.py\n```\n\nThe pipeline runs the deterministic shortlist refresh, HKEX listing-status verification, priority HKEX document parsing, DD evidence backfill, top-3 body-level DD assessment, and this delivery report generation.\n\n## 2. Current Data Coverage\n\n- Initial screening rows: **3146**\n- Candidate DD scaffold rows: **1063**\n- Top15 DD queue rows: **15**\n- Top10 DD shortlist rows: **10**\n- Reserve pool rows: **5**\n- HKEX listing-status verification rows: **3146**; counts: `{'active': 3038, 'not_found': 20, 'inactive_or_delisted': 88}`\n- Source evidence rows: **479**\n- Body-level HKEX evidence rows: **91**\n\n## 3. Current Top10 DD Shortlist\n\n1. **00831.HK 利亚零售** — score `100.0`, listing `active`, body docs `5`, body evidence rows `16`.\n2. **00573.HK 稻香控股** — score `94.36`, listing `active`, body docs `3`, body evidence rows `11`.\n3. **00518.HK 同得仕（集团）** — score `90.86`, listing `active`, body docs `3`, body evidence rows `11`.\n4. **01749.HK 杉杉品牌** — score `80.92`, listing `active`, body docs `4`, body evidence rows `16`.\n5. **00256.HK 冠城钟表珠宝** — score `77.79`, listing `active`, body docs `3`, body evidence rows `10`.\n6. **02619.HK 香江电器** — score `77.05`, listing `active`, body docs `3`, body evidence rows `8`.\n7. **00759.HK CEC INT'L HOLD** — score `76.64`, listing `active`, body docs `3`, body evidence rows `12`.\n8. **00125.HK 新兴光学** — score `76.56`, listing `active`, body docs `5`, body evidence rows `15`.\n9. **08136.HK 英马斯集团** — score `75.55`, listing `active`, body docs `2`, body evidence rows `8`.\n10. **00919.HK 现代健康科技** — score `74.34`, listing `active`, body docs `2`, body evidence rows `6`.\n\n## 4. Top3 Practical Recommendation\n\n- **00831.HK 利亚零售**: `keep_first_line` — supported `3`, risk/gating `2`, pending `1`.\n- **00573.HK 稻香控股**: `second_line_operating_platform_review` — supported `2`, risk/gating `3`, pending `1`.\n- **00518.HK 同得仕（集团）**: `third_line_or_reserve_due_to_operating/debt_perimeter` — supported `2`, risk/gating `4`, pending `0`.\n\nPractical readout: **00831.HK remains the first-line candidate**. 00573.HK and 00518.HK remain useful comparables / backups, but they are more operating-heavy and require more carve-out/perimeter work.\n\n## 5. Files That Matter\n\nCore outputs:\n- `outputs/reports/tuntun_hk_delivery_report.md` — this file\n- `outputs/reports/tuntun_hk_restructuring_screening_report.md` — integrated report\n- `outputs/reports/tuntun_hk_top3_dd_assessment.md` — top3 body-level DD readout\n- `data/processed/dd_shortlist_top10.csv` — current top10\n- `data/processed/dd_body_evidence_summary_top10.csv` — top10 body evidence summary\n- `data/processed/top3_dd_assessment_summary.csv` and `top3_dd_assessment_details.csv` — top3 assessment tables\n- `data/evidence/source_evidence_table.csv` — source evidence table\n\nCore scripts:\n- `scripts/run_delivery_pipeline.py` — one-command pipeline\n- `scripts/build_dd_shortlists.py`\n- `scripts/verify_hkex_listing_status.py`\n- `scripts/fetch_priority_documents.py`\n- `scripts/update_dd_with_body_evidence.py`\n- `scripts/build_top3_dd_assessment.py`\n- `scripts/generate_delivery_report.py`\n\n## 6. Boundary / Do Not Overstate\n\nThis is now a runnable DD-priority workflow and a usable report pack. It is **not** a final legal, accounting, or investment recommendation. The next valuable human-review step is narrow: manually verify 00831.HK franchise/licence continuity, shareholder/control path, and connected-transaction perimeter in the original PDFs.\n", "defaultBrief": "吨吨健康科技集团拟在港股市场筛选适合资产注入、业务整合、控股权交易或上市公司重组的上市平台。请输出候选排序、关键风险、DD 要点和综合报告。"};

function esc(s){return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function renderMetrics(){document.getElementById('metrics').innerHTML=Object.entries(DATA.metrics).map(([k,v])=>`<div class="metric"><div>${esc(k)}</div><strong>${v}</strong></div>`).join('')}
function renderTimeline(active=-1, done=false){document.getElementById('timeline').innerHTML=steps.map((s,i)=>`<div class="step ${done||i<active?'done':i===active?'running':''}"><div class="dot"></div><div><div class="step-title">${i+1}. ${s}</div><div class="step-sub">${done||i<active?'done':i===active?'running':'pending'}</div></div></div>`).join('')}
function renderResults(){document.getElementById('top3').innerHTML=DATA.top3.map(c=>`<div class="candidate"><div class="code">${esc(c.code)}</div><div class="name">${esc(c.name)}</div><div class="score">${esc(c.score)}</div><div class="kv"><strong>View</strong><span>${esc(c.view)}</span></div><div class="kv"><strong>Supported</strong><span>${esc(c.supported)}</span></div><div class="kv"><strong>Risk</strong><span>${esc(c.risk)}</span></div><div class="kv"><strong>Pending</strong><span>${esc(c.pending)}</span></div><div class="kv"><strong>Next</strong><span>${esc(c.next)}</span></div></div>`).join('');document.getElementById('report').textContent=DATA.report;document.getElementById('delivery').textContent=DATA.delivery;document.getElementById('empty').classList.add('hidden');document.getElementById('results').classList.remove('hidden');document.getElementById('reports').classList.remove('hidden')}
document.getElementById('brief').value=DATA.defaultBrief;renderMetrics();renderTimeline();
document.getElementById('reset').onclick=()=>{document.getElementById('brief').value=DATA.defaultBrief;document.getElementById('state').textContent='Ready';document.getElementById('state').className='status';renderTimeline();document.getElementById('empty').classList.remove('hidden');document.getElementById('results').classList.add('hidden');document.getElementById('reports').classList.add('hidden')};
